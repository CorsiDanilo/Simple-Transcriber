name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published, created]

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Find and Rename Signed APK
        run: |
          SIGNED_APK="${{ steps.sign_app.outputs.signedReleaseFile }}"
          if [ -z "$SIGNED_APK" ]; then
            echo "Error: Signed APK not found"
            exit 1
          fi
          echo "Found Signed APK at $SIGNED_APK"
          cp "$SIGNED_APK" transcriber-signed.apk
          sha256sum transcriber-signed.apk > transcriber-signed.apk.sha256

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            transcriber-signed.apk
            transcriber-signed.apk.sha256
          generate_release_notes: true
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Proprietà del progetto Gradle
# Per ulteriori dettagli: http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifica la JVM per il processo Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Abilita AndroidX (obbligatorio per Jetpack Compose e tutte le librerie moderne)
android.useAndroidX=true

# Abilita la compilazione incrementale di Kotlin con kapt
kotlin.code.style=official

# Abilita la funzionalità non stabile delle API di Compose
android.nonTransitiveRClass=true
